<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Página no encontrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Diseño de pagina/diseño 404.css">
</head>
<body>
    <div class="animation-container">
        <h1 class="error-code">404</h1>
    </div>
    <div class="wire-wrapper">
        <div class="wire-section left-wire"></div>
        <div class="wire-cut">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 3L6 13H11L9 21L16 11H11L13 3Z" fill="#1c3285" stroke="#1c3285" stroke-width="2" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="wire-section right-wire"></div>
        <div class="plug-male">
            <div class="plug-body"><div class="plug-texture"></div></div>
            <div class="prongs-container">
                <div class="prong"><div class="prong-hole"></div></div>
                <div class="prong"><div class="prong-hole"></div></div>
            </div>
        </div>
    </div>
    <div class="text-content">
        <h2>CONEXIÓN INTERRUMPIDA</h2>
        <p>Parece que alguien tropezó con el cable. La página que buscas no está conectada o ha sido movida.</p>
        <a href="index.html" class="btn-home">VOLVER AL INICIO</a>
    </div>
</body>
</html>
